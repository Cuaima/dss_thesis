version: "3.9"

services:
  preprocess:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: depression_forum_preprocess
    volumes:
      # Mount data folder read-only — proprietary, never written to by container
      - ./data:/app/data:ro
      # Mount output folder read-write — pipeline writes cleaned CSVs here
      - ./output:/app/output
      # Mount source code so changes are reflected without rebuilding
      - ./preprocess.py:/app/preprocess.py
      - ./config.py:/app/config.py
    environment:
      - PYTHONUNBUFFERED=1   # ensures print() output is visible in logs
    command: python preprocess.py

  notebook:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: depression_forum_notebook
    ports:
      - "8888:8888"
    volumes:
      - ./data:/app/data:ro
      - ./output:/app/output
      - ./notebooks:/app/notebooks
      - ./preprocess.py:/app/preprocess.py
      - ./config.py:/app/config.py
    environment:
      - PYTHONUNBUFFERED=1
    command: >
      jupyter lab
        --ip=0.0.0.0
        --port=8888
        --no-browser
        --notebook-dir=/app/notebooks
        --NotebookApp.token=''
        --NotebookApp.password=''
    # NOTE: token and password are disabled for local development only.
    # Do not expose port 8888 publicly.
